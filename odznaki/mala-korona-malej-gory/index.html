<head>
  <title>Mała Korona Małej Góry</title>

  <meta property="og:url" content="https://malagora.github.io/" />

  <meta property="og:image:type" content="image/jpeg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />

  <meta name="twitter:description" content="Zobacz najważniejsze informacje, przewodniki i zdjęcia." />
  <meta name="twitter:image" content="https://github.com/malagora/malagora.github.io/blob/bdf1ac055ed133745ac2f3e79eaa59bfdd0533a0/media/MG-BG-min.jpg" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
  <style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background-color: #111;
  background-attachment: fixed;
  background-repeat: no-repeat;
  background-position: center top;
  font-family: "Bahnschrift SemiBold Condensed", "Bahnschrift", sans-serif;
  font-weight: 600;
  font-stretch: condensed;
  touch-action: none;
  overscroll-behavior: none;
  position: relative;
}


.logo, {
    transform-origin: center center;
}


* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}


a {
	text-decoration: none;
}

li {
	list-style: none;
}

.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  height: 70px;
  width: auto;
  opacity: 0;
  transform: translateX(-50px);
  animation: slideLogo .5s ease forwards;
  cursor: pointer;
  z-index: 100;
}

@keyframes slideLogo {
  0% {
    transform: translateX(-50px);
    opacity: 0;
  }
  100% {
    transform: translateX(0);
    opacity: 1;
  }
}

.background-img {
  background: url('/media/photos/MG-2026-05-10-003.jpg');
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.timeLock {
  width: 100%;
  height: 100%;
}

.text-container {
  padding: 30px;
  position: absolute;
  z-index: 10;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
  mix-blend-mode: difference;
  filter: contrast(40%);
}
.text-container h2 {
  font-size: 50px;
  line-height: 50px;
}
.text-container h1 {
  font-size: 150px;
  line-height: 150px;
}

@media (max-width: 1000px) {
  .text-container h2 {
    font-size: 25px;
    line-height: 25px;
  }
  .text-container h1 {
    font-size: 75px;
    line-height: 75px;
  }
  .text-container {
    padding: 15px;
    top: auto;
    left: 50%;
    bottom: 0;
    transform: translate(-50%, 0);
  }
}
  </style>
</head>

<body>
  <div class="timeLock">
    <img src="/media/LOGO_BLACK.png" onclick="window.history.back()" alt="Mała Góra" class="logo">
    <div class="background-img"></div>
    <div class="text-container"><h2>SYSTEM BĘDZIE DOSTĘPNY</h2><h1>1.06.2026</h1></div>
  </div>
  <script>
document.addEventListener("DOMContentLoaded", () => {
    const lockElements = document.querySelectorAll(".timeLock");

    const unlockDate = new Date(2026, 5, 1);

    const now = new Date();

    if (now >= unlockDate) {
        lockElements.forEach(el => {
            el.style.display = "none";
        });
    }
});
  </script>
</body>
</html>
